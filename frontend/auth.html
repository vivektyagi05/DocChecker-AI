<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocChecker AI - Secure Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at 50% 50%, #0d0b21 0%, #050409 100%);
        }
        .glass-panel {
            background: rgba(13, 11, 33, 0.45);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .g-glow {
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.15);
        }
        .glow-btn:hover {
            box-shadow: 0 0 25px rgba(99, 102, 241, 0.5);
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="min-h-screen text-slate-100 flex items-center justify-center p-4 relative overflow-hidden">
    <!-- Floating background decorative shapes -->
    <div class="absolute w-96 h-96 rounded-full bg-indigo-600/10 blur-[100px] -top-10 -left-10 animate-pulse"></div>
    <div class="absolute w-96 h-96 rounded-full bg-purple-600/10 blur-[100px] -bottom-10 -right-10 animate-pulse" style="animation-delay: 2s;"></div>

    <div class="w-full max-w-md z-10">
        <!-- Logo -->
        <div class="flex items-center justify-center gap-3 mb-8">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/20">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                </svg>
            </div>
            <span class="text-2xl font-bold tracking-tight bg-gradient-to-r from-indigo-200 via-indigo-100 to-purple-200 bg-clip-text text-transparent">DocChecker AI</span>
        </div>

        <!-- Auth Card -->
        <div class="glass-panel g-glow rounded-3xl p-8 relative">
            <h2 id="auth-title" class="text-2xl font-semibold mb-2">Welcome Back</h2>
            <p id="auth-subtitle" class="text-sm text-slate-400 mb-6">Enter your details to sign in to your vault.</p>

            <form id="auth-form" class="space-y-5">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2" for="email">Email Address</label>
                    <input class="w-full bg-slate-950/60 border border-slate-800 rounded-xl px-4 py-3 text-slate-100 placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all duration-300" 
                           type="email" id="email" placeholder="name@example.com" required>
                </div>
                
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2" for="password">Password</label>
                    <input class="w-full bg-slate-950/60 border border-slate-800 rounded-xl px-4 py-3 text-slate-100 placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all duration-300" 
                           type="password" id="password" placeholder="••••••••" required>
                </div>

                <!-- Error feedback banner -->
                <div id="error-banner" class="hidden bg-red-950/40 border border-red-500/20 text-red-300 text-xs rounded-xl p-3 flex items-center gap-2">
                    <svg class="w-4 h-4 text-red-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <span id="error-message">Invalid email or password.</span>
                </div>

                <!-- Success feedback banner -->
                <div id="success-banner" class="hidden bg-emerald-950/40 border border-emerald-500/20 text-emerald-300 text-xs rounded-xl p-3 flex items-center gap-2">
                    <svg class="w-4 h-4 text-emerald-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <span id="success-message">Success! Redirecting...</span>
                </div>

                <button class="w-full glow-btn bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-medium py-3 px-4 rounded-xl transition-all duration-300 shadow-md shadow-indigo-950/50 flex items-center justify-center gap-2" 
                        type="submit" id="auth-btn">
                    <span>Sign In</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
                    </svg>
                </button>
            </form>

            <div class="mt-6 text-center text-sm text-slate-400 border-t border-slate-900 pt-6">
                <span id="toggle-hint">New to DocChecker?</span>
                <button id="toggle-auth" class="text-indigo-400 hover:text-indigo-300 font-semibold focus:outline-none ml-1">Create an account</button>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
